name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

# Cancel previous runs of the same PR if a new push is made
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.1"

jobs:
  code-quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dev dependencies
        run: uv sync --all-packages --group dev

      - name: Run Ruff Linter
        run: uv run ruff check apps/ libs/
        # Catches logic errors (F), style violations (E/W), and unoptimized code (UP)

      - name: Run Ruff formatter check
        run: uv run ruff format --check apps/ libs/
        # Fails if the code is not formatted correctly

  test:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: code-quality # Only runs if linting passes first

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Run unit tests with coverage
        run: |
          cd apps/api
          uv run pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always() && !env.ACT # Upload even if tests fail; skip when running locally via act
        with:
          name: coverage-report
          path: apps/api/coverage.xml
          retention-days: 7

  docker-build:
    name: "Docker Build Check"
    runs-on: ubuntu-latest
    needs: test # Only runs if tests pass

    steps:
      - name: Checkout repository
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('docker/Dockerfile') }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            buildx-${{ runner.os }}-

      - name: Build Docker image (Dry Run)
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runner # Validates the production stage (runner)
          push: false # Dry Run: builds but does NOT push to any registry
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        # Prevents the cache from growing indefinitely
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
