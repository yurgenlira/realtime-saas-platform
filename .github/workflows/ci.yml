name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs of the same PR if a new push is made
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.1"

jobs:
  code-quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dev dependencies
        run: uv sync --all-packages --group dev

      - name: Run Ruff Linter
        run: uv run ruff check apps/ libs/
        # Catches logic errors (F), style violations (E/W), and unoptimized code (UP)

      - name: Run Ruff formatter check
        run: uv run ruff format --check apps/ libs/
        # Fails if the code is not formatted correctly

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: code-quality # Only runs if linting passes first

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Run unit tests with coverage
        run: |
          cd apps/api
          uv run pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always() && !env.ACT # Upload even if tests fail; skip when running locally via act
        with:
          name: coverage-report
          path: apps/api/coverage.xml
          retention-days: 7

  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: sqs
          DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Run integration tests
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          DATABASE_URL: "sqlite:///:memory:"
          SQS_WAIT_TIME_SECONDS: "0"
        run: uv run pytest apps/api/tests/integration/ -v

  docker-build:
    name: "Docker Build Check"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests] # Only runs if tests pass

    steps:
      - name: Checkout repository
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('docker/Dockerfile') }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            buildx-${{ runner.os }}-

      - name: Build API image (Dry Run)
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runner-api # Validates the production stage (runner-api)
          push: false # Dry Run: builds but does NOT push to any registry
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build Worker image (Dry Run)
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runner-worker # Validates the production stage (runner-worker)
          push: false # Dry Run: builds but does NOT push to any registry
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        if: ${{ !env.ACT }} # Skip when running locally via act (no Docker-in-Docker)
        # Prevents the cache from growing indefinitely
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write # required for OIDC
      contents: read
      pull-requests: write # required to post plan as PR comment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.7"

      - name: Terraform Init
        working-directory: infra/terraform/envs/dev
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: infra/terraform/envs/dev
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infra/terraform/envs/dev
        run: |
          set -o pipefail
          terraform plan -input=false -no-color 2>&1 | tee plan_output.txt
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}

      - name: Post Plan as PR Comment
        uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/envs/dev/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });
