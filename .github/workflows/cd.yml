name: CD Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false # Never cancel a deploy in progress

jobs:
  build-and-push:
    name: "Build and Push ${{ matrix.service }}"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        include:
          - service: api
            ecr_repo_url: ECR_API_REPOSITORY_URL
          - service: worker
            ecr_repo_url: ECR_WORKER_REPOSITORY_URL

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }} image
        env:
          IMAGE_URI: ${{ vars[matrix.ecr_repo_url] }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --file docker/Dockerfile \
            --target runner-${{ matrix.service }} \
            --tag $IMAGE_URI:$IMAGE_TAG \
            --tag $IMAGE_URI:latest \
            .
          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

  deploy:
    name: "Deploy to EC2"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to EC2 via SSM RunCommand
        env:
          API_IMAGE_URI: ${{ vars.ECR_API_REPOSITORY_URL }}:${{ github.sha }}
          WORKER_IMAGE_URI: ${{ vars.ECR_WORKER_REPOSITORY_URL }}:${{ github.sha }}
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ vars.ECR_API_REPOSITORY_URL }}',
              'docker pull ${{ env.API_IMAGE_URI }}',
              'docker pull ${{ env.WORKER_IMAGE_URI }}',
              'docker stop api || true',
              'docker rm api || true',
              'docker run -d --name api --restart unless-stopped -p 8000:8000 --env-file /opt/app/.env ${{ env.API_IMAGE_URI }}',
              'docker stop worker || true',
              'docker rm worker || true',
              'docker run -d --name worker --restart unless-stopped --env-file /opt/app/.env ${{ env.WORKER_IMAGE_URI }}'
            ]" \
            --query "Command.CommandId" \
            --output text)

            echo "SSM Command ID: $COMMAND_ID"

          # Wait for command completion
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          # Check exit code
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          echo "Deploy status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
